spring.application.name=TicketWizard

# --- Config ---
# Read the .env file as a properties file to load environment variables natively
spring.config.import=optional:file:.env[.properties]

# --- DataSource ---
# ${VAR:default} = use OS env var VAR if set, otherwise use the fallback default.
# With spring.config.import above, Spring Boot now reads .env directly.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/ticketwizard}
spring.datasource.username=${TW_USER:postgres}
spring.datasource.password=${TW_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# validate = Hibernate checks that entity classes match the DB schema, but never alters it.
# Flyway is the ONLY thing allowed to change the schema, via versioned migration scripts.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG

server.error.include-stacktrace=never

# --- Flyway ---
# Automatically enabled when flyway-core is on the classpath.
# On startup, Flyway runs any new scripts in db/migration (already-applied scripts
# are tracked in flyway_schema_history and skipped).
spring.flyway.enabled=true
